@startuml
hide footbox

skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam actorBorderColor black
skinparam actorBackgroundColor white
skinparam arrowColor black  
skinparam sequenceLifeLineBorderColor #5FB8EC
skinparam sequenceParticipantBorderColor #5FB8EC
skinparam sequenceParticipantBackgroundColor white

actor "Nakupni\nuradnik" as NakupniUradnik <<actor>>
participant "Naročilo" as Narocilo
participant "Proračun" as Proracun
participant "Naročila" as Narocila <<datastore>>
actor Dobavitelj <<actor>>

NakupniUradnik -> Narocilo: izpolni()
activate NakupniUradnik
activate Narocilo
Narocilo -> Narocilo: preveri()
activate Narocilo
deactivate Narocilo
Narocilo -> Proracun: posodobi(količina)
activate Proracun
deactivate Proracun
Narocilo -> Narocila: shrani()
activate Narocila
Narocila -> Dobavitelj: pošlji()
activate Dobavitelj
deactivate Dobavitelj
deactivate Narocila
deactivate Narocilo
deactivate NakupniUradnik
@enduml

