th d="M102.5,238.125 L166.5,238.125 L166.5,245.125 L156.5,255.125 L102.5,255.125 L102.5,238.125 " fill="#EEEEEE" style="stroke:#000000;stroke-width:1.0;"/><rect fill="none" height="90.2031" style="stroke:#000000;stroke-width:2.0;" width="289" x="102.5" y="238.125"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="19" x="117.5" y="251.1919">alt</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="108" x="181.5" y="250.3354">[avtorizacija OK]</text><polygon fill="#000000" points="171,272.3906,161,276.3906,171,280.3906,167,276.3906" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="165" x2="322" y1="276.3906" y2="276.3906"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="108" x="177" y="271.3247">Podatki o bolniku</text><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="102.5" x2="391.5" y1="285.3906" y2="285.3906"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="136" x="107.5" y="295.6011">[avtorizacija napaka]</text><polygon fill="#000000" points="171,316.3281,161,320.3281,171,324.3281,167,320.3281" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="165" x2="322" y1="320.3281" y2="320.3281"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130" x="177" y="315.2622">Napaka (ni dostopa)</text><!--MD5=[80041b622765b3b02b0b99467c1934d2]
@startuml
hide footbox

skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam actorBorderColor black
skinparam actorBackgroundColor white
skinparam arrowColor black  
skinparam sequenceLifeLineBorderColor #5FB8EC
skinparam sequenceParticipantBorderColor #5FB8EC
skinparam sequenceParticipantBackgroundColor white

actor Referent <<actor>>

participant BolnikInfo <<P>>
participant "Mentcare-PB" as MentcarePB <<D>>
participant Avtorizacija <<AS>>

Referent -> BolnikInfo: PoglejInfo(BID)
activate Referent
activate BolnikInfo

BolnikInfo -> MentcarePB: porocilo(info, BID, UID)
activate MentcarePB

MentcarePB -> Avtorizacija: avtorizacija(info, UID)
activate Avtorizacija
Avtorizacija - -> MentcarePB: avtorizacija
deactivate Avtorizacija

alt avtorizacija OK
MentcarePB - -> BolnikInfo: Podatki o bolniku
else avtorizacija napaka
MentcarePB - -> BolnikInfo: Napaka (ni dostopa)
end
@enduml

