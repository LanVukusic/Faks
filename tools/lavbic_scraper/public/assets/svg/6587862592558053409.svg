@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam usecase {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

left to right direction

actor Referent
usecase (Prijava\nbolnika) as (PrijavaBolnika)
usecase (Ogled\nosebnih\npodatkov) as (OgledOsebnihPodatkov)
actor Upravljalec
usecase (Izvoz\nstatistike) as (IzvozStatistike)
usecase (Kreiranje\nporočila) as (KreiranjePorocila)
actor Zdravnik
actor "Medicinska\nsestra" as MedicinskaSestra
usecase (Ogled\nzapisa) as (OgledZapisa)
usecase (Urejanje\nzapisa) as (UrejanjeZapisa)
usecase (Določitev\nposveta) as (DolocitevPosveta)

Zdravnik -up-> (DolocitevPosveta)
Zdravnik -up-> (UrejanjeZapisa)
MedicinskaSestra - -> (UrejanjeZapisa)
Zdravnik -up-> (OgledZapisa)
MedicinskaSestra - -> (OgledZapisa)
Zdravnik -up-> (KreiranjePorocila)
Upravljalec -up-> (KreiranjePorocila)
Upravljalec -up-> (IzvozStatistike)
Upravljalec -up-> (OgledOsebnihPodatkov)
Referent - -> (PrijavaBolnika)
Referent - -> (OgledOsebnihPodatkov)
@enduml

