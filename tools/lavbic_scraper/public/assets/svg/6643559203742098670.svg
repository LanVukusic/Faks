reverse link IzvrsljivaKoda to Prevajalnik3--><path d="M519.19,72 C510.45,81.22 500.53,91.26 491,100 C477.24,112.61 460.89,125.76 447.91,135.8 " fill="none" id="IzvrsljivaKoda-backto-Prevajalnik3" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="522.86,68.11,513.7789,71.9223,519.4332,71.751,519.6045,77.4053,522.86,68.11" style="stroke:#000000;stroke-width:1.0;"/><!--MD5=[b9673cc8c245e70c509164d7fca01afe]
@startuml
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center
hide stereotype

skinparam arrowColor black
skinparam rectangle {
  backgroundColor White
  backgroundColor<<model>> #e8f5fd
  borderColor #5FB8EC
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

together {
  rectangle "Model,\nneodvisen od\nizvajanja (**CIM**)" <<model>> as CIM
  rectangle "Model,\nneodvisen od\nplatforme (**PIM**)" <<model>> as PIM
  rectangle "Model,\nodvisen od\nplatforme (**PSM**)" <<model>> as PSM
  rectangle "Izvršljiva\nkoda" as IzvrsljivaKoda
}
together {
  rectangle "Prevajalnik" as Prevajalnik1
  rectangle "Prevajalnik" as Prevajalnik2
  rectangle "Prevajalnik" as Prevajalnik3
}
together {
  rectangle "Smernice\nproblemske\ndomene" as SmerniceProblemskeDomene
  actor Uporabnik  
  rectangle "Posebni vzorci\nin pravila\nplatforme" as PosebniVzorciInPravilaPlatforme
  rectangle "Posebni\nvzorci\njezika" as PosebniVzorciJezika
}


CIM -down-> Prevajalnik1
SmerniceProblemskeDomene -up-> Prevajalnik1
Uporabnik -up-> Prevajalnik1
Prevajalnik1 -up-> PIM
PIM .right.> PSM
PIM -down-> Prevajalnik2
PosebniVzorciInPravilaPlatforme -up-> Prevajalnik2
Prevajalnik2 -up-> PSM
PSM -down-> Prevajalnik3
PosebniVzorciJezika -up-> Prevajalnik3
PSM .right.> IzvrsljivaKoda
Prevajalnik3 -up-> IzvrsljivaKoda
@enduml

