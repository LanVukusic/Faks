@startuml
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center
hide stereotype

skinparam arrowColor black
skinparam rectangle {
  backgroundColor White
  backgroundColor<<izdelek>> #e8f5fd
  borderColor #5FB8EC
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

rectangle "J2EE\nprevajalnik" as J2EEPrevajalnik
rectangle "J2EE specifični\nmodel" <<izdelek>> as J2EESpecificniModel
rectangle "Generator Java\nizvorne kode" as GeneratorJavaIzvorneKode
rectangle "Java program" <<izdelek>> as JavaProgram
rectangle "Model,\nneodvisen od\nplatforme (**PIM**)" <<izdelek>> as PIM
rectangle ".NET\nprevajalnik" as NETPrevajalnik
rectangle ".NET specifični\nmodel" <<izdelek>> as NETSpecificniModel
rectangle "Generator C#\nizvorne kode" as GeneratorCSharpIzvorneKode
rectangle "C# program" <<izdelek>> as CSharpProgram

PIM -up-> J2EEPrevajalnik
J2EEPrevajalnik -right-> J2EESpecificniModel
J2EESpecificniModel -right-> GeneratorJavaIzvorneKode
GeneratorJavaIzvorneKode -right-> JavaProgram
PIM -down-> NETPrevajalnik
NETPrevajalnik -right-> NETSpecificniModel
NETSpecificniModel -right-> GeneratorCSharpIzvorneKode
GeneratorCSharpIzvorneKode -right-> CSharpProgram
@enduml

