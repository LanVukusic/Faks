@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam usecase {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

left to right direction

actor "Neregistriran\nuporabnik" as NeregistriranUporabnik
actor "Registriran\nuporabnik" as RegistriranUporabnik
RegistriranUporabnik -left-|> NeregistriranUporabnik
actor "Delavec\nknjižnice" as DelavecKnjiznice
DelavecKnjiznice -left-|> RegistriranUporabnik
actor "Sistem za\nidentifikacijo\nuporabnikov" as SistemZaIdentifikacijoUporabnikov
actor "Skrbnik\nknjižnice" as SkrbnikKnjiznice
actor "Glavni\nskrbnik\nsistema" as GlavniSkrbnikSistema

rectangle "Informacijski sistem knjižnice" {
  usecase (Iskanje\nknjižnice) as IskanjeKnjiznice
  usecase (Iskanje\ndokumentov\nzasebne knjižnice) as IskanjeDokumentovZasebneKnjiznice
  usecase (Iskanje vseh\ndokumentov\nnaenkrat) as IskanjeVsehDokumentovNaenkrat
  usecase (Naročanje\ndokumenta) as NarocanjeDokumenta
  usecase (Brisanje dokumenta\niz baze podatkov\nknjižnice) as BrisanjeDokumenta
  usecase (Vpis dokumenta\nv bazo knjižnice) as VpisDokumenta
  usecase (Vpis nove\nknjižnice v sistem) as VpisNoveKnjiznice
}

NeregistriranUporabnik -down-> (IskanjeKnjiznice)
NeregistriranUporabnik -down-> (IskanjeDokumentovZasebneKnjiznice)
NeregistriranUporabnik -down-> (IskanjeVsehDokumentovNaenkrat)
RegistriranUporabnik -down-> (NarocanjeDokumenta)
(NarocanjeDokumenta) -down-> SistemZaIdentifikacijoUporabnikov
SkrbnikKnjiznice -down-> (BrisanjeDokumenta)
SkrbnikKnjiznice -down-> (VpisDokumenta)
GlavniSkrbnikSistema -down-> (VpisNoveKnjiznice)
@enduml

