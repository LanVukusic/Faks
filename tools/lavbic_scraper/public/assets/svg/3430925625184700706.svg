0;stroke-width:1.0;" x1="58" x2="779" y1="694.3828" y2="694.3828"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52" x="65" y="689.3169">odjava()</text><!--MD5=[ea2827e17d30f925a9443c16948423dc]
@startuml
hide footbox

skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam actorBorderColor black
skinparam actorBackgroundColor white
skinparam arrowColor black  
skinparam sequenceLifeLineBorderColor #5FB8EC
skinparam sequenceParticipantBorderColor #5FB8EC
skinparam sequenceParticipantBackgroundColor white

actor Referent <<actor>>
participant BolnikInfo <<P>>
participant "Mentcare-PB" as MentcarePB <<D>>
participant Avtorizacija <<AS>>
participant Povzetek
actor "Sistem\nevidence\nbolnikov" as SistemEvidenceBolnikov <<actor>>

Referent -> SistemEvidenceBolnikov: prijava()
activate Referent
activate SistemEvidenceBolnikov
SistemEvidenceBolnikov - -> Referent: // OK

alt Pošlji podatke
  Referent -> BolnikInfo: posodobiInfo()
  activate BolnikInfo
  BolnikInfo -> MentcarePB: posodobiEvidenco(UID)
  activate MentcarePB
  MentcarePB -> Avtorizacija: avtorizacija(TF, UID)
  activate Avtorizacija
  Avtorizacija - -> MentcarePB: // Avtorizacija
  deactivate Avtorizacija
  MentcarePB -> SistemEvidenceBolnikov: posodobi(BID)
  SistemEvidenceBolnikov - -> MentcarePB: // Posodobitev OK
  MentcarePB - -> BolnikInfo: // Sporočilo OK
else Pošlji povzetek
  Referent -> BolnikInfo: posodobiPovzetek()
  BolnikInfo -> MentcarePB: povzetek(UID)
  MentcarePB -> Avtorizacija: avtorizacija(TF, UID)
  activate Avtorizacija
  Avtorizacija - -> MentcarePB: // Avtorizacija
  deactivate Avtorizacija
  MentcarePB -> Povzetek
  activate Povzetek
  Povzetek -> SistemEvidenceBolnikov: posodobi(BID)
  SistemEvidenceBolnikov - -> Povzetek: // Posodobitev OK
  Povzetek - -> BolnikInfo: // Sporočilo OK
  deactivate BolnikInfo
  deactivate MentcarePB
  deactivate Povzetek
end

Referent -> SistemEvidenceBolnikov: odjava()
@enduml

