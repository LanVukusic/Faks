@startuml
skinparam class {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center
hide circle

Class Zdravnik {
  +ime: string
  -telefonska številka: string
  -email: string
  +prijava(): void
  +odjava(): void
}
Class "Bolnišnični zdravnik" as BolnisnicniZdravnik {
  -številka zaposlenega: int
  -številka pozivnika: string
}
Class "Splošni zdravnik" as SplosniZdravnik {
  +ordinacija: string
  -naslov: string
}

Zdravnik <|- - BolnisnicniZdravnik
Zdravnik <|- - SplosniZdravnik
@enduml

