@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam arrowColor black
skinparam state {
  BackgroundColor white
  BorderColor #5FB8EC
  StartColor #5FB8EC
  EndColor #5FB8EC
}

state "Čakanje" as Cakanje
Cakanje: do: prikaži čas

state "Polna moč" as PolnaMoc
PolnaMoc: do: nastavi moč = 600

state "Polovična moč" as PolovicnaMoc
PolovicnaMoc: do: nastavi moč = 300

state "Nastavi čas" as NastaviCas
NastaviCas: do: pridobi število
NastaviCas: exit: nastavi čas

state "Omogočeno" as Omogoceno
Omogoceno: do: prikaži 'Pripravljen'

state "Onemogočeno" as Onemogoceno
Onemogoceno: do: prikaži 'Čakam'

state Delovanje
Delovanje: do: delovanje mikrovalovne pečice

[*] -> Cakanje

Cakanje - -> PolnaMoc: polna moč
Cakanje - -> PolovicnaMoc: polovična\nmoč
PolnaMoc - -> PolovicnaMoc: polovična\nmoč
PolovicnaMoc - -> PolnaMoc: polna\nmoč
PolnaMoc - -> NastaviCas: časovnik
PolovicnaMoc - -> NastaviCas: časovnik
NastaviCas - -> NastaviCas: število
NastaviCas - -> Onemogoceno: vrata\nodprta
NastaviCas - -> Omogoceno: vrata\nzaprta
Onemogoceno - -> Omogoceno: vrata\nzaprta
Omogoceno - -> Delovanje: začetek
Delovanje - -> Onemogoceno: vrata\nodprta
Delovanje -> Cakanje: zaključek
Delovanje -> Cakanje: preklic

Cakanje -> [*]
@enduml

