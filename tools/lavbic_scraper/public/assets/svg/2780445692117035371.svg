link Zaustavljen to *end--><path d="M344.23,32 C354.17,32 364.11,32 374.05,32 " fill="none" id="Zaustavljen-to-*end" style="stroke:#000000;stroke-width:1.0;"/><polygon fill="#000000" points="379.24,32,370.24,28,374.24,32,370.24,36,379.24,32" style="stroke:#000000;stroke-width:1.0;"/><!--MD5=[50eb148afc37a89ef692cc9ddc2b6bf6]
@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam arrowColor black
skinparam state {
  BackgroundColor white
  BorderColor #5FB8EC
  StartColor #5FB8EC
  EndColor #5FB8EC
}

state Nadzorovan
state Zaustavljen
state Nastavljanje
state Delovanje #e8f5fd {
  state Izvajanje
  state Testiranje
  state "Pošiljanje" as Posiljanje
  state "Priprava\npovzetka" as PripravaPovzetka
  state Zbiranje
}

[*] -> Zaustavljen

Zaustavljen - -> Izvajanje: ponovniZagon()
Zaustavljen - -> Nastavljanje: ponovnaNastavitev(),\nvarcevanje()
Nastavljanje - -> Izvajanje: nastavljanje zaključeno

Izvajanje - -> Zaustavljen: zaustavitev()
Izvajanje - -> Nadzorovan: oddaljenNadzor()
Izvajanje - -> Testiranje: porocajStatus()
Izvajanje - -> Zbiranje: ura
Izvajanje - -> PripravaPovzetka: porocajVreme()

Testiranje - -> Posiljanje: testiranje\nzaključeno

Posiljanje - -> Izvajanje: pošiljanje\nzaključeno

PripravaPovzetka - -> Posiljanje: priprava\npovzetka\nzaključena

Zbiranje - -> Izvajanje: zbiranje\nzaključeno

Zaustavljen -> [*]
@enduml

