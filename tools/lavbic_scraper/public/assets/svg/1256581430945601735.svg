@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
hide stereotype

skinparam arrowColor black
skinparam rectangle {
  backgroundColor<<sistem>> White
  backgroundColor #e8f5fd
  borderColor #5FB8EC
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

rectangle "Sistem\nračunalniškega\nvida" as SistemRacunalniskegaVida <<sistem>>
rectangle "Sistem za\nrazpoznavo\nobjektov" as SistemZaRazpoznavoObjektov <<sistem>>
rectangle Polnjenje {
  rectangle "Krmilnik\nroke" as KrmilnikRoke <<sistem>>
  rectangle "Krmilnik\nprijemala" as KrmilnikPrijemala <<sistem>>
}
rectangle Pakiranje {
  rectangle "Sistem za\nizbiro\nembalaže" as SistemZaIzbiroEmbalaze <<sistem>>
  rectangle "Sistem za\npakiranje" as SistemZaPakiranje <<sistem>>
}
rectangle "Krmilnik\ntekočega traku" as KrmilnikTekocegaTraku <<sistem>>

SistemRacunalniskegaVida -down-> Polnjenje
SistemRacunalniskegaVida -down-> SistemZaRazpoznavoObjektov
SistemZaRazpoznavoObjektov -right-> Polnjenje
SistemZaRazpoznavoObjektov -down-> Pakiranje
SistemZaPakiranje <-up-> Polnjenje
SistemZaPakiranje  -right-> KrmilnikTekocegaTraku
SistemZaIzbiroEmbalaze <- -> SistemZaPakiranje
@enduml

