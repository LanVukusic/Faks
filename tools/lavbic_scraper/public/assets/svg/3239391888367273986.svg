@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam ArrowColor black
skinparam package {
  backgroundcolor white
  bordercolor #5FB8EC
}
skinparam rectangle {
  backgroundcolor #e8f5fd
  bordercolor #5FB8EC
}

package ZbiranjePodatkov {
  rectangle Oddajnik
  rectangle Sprejemnik
  rectangle "Vremenski\npodatki" as VremenskiPodatki
}

Sprejemnik -right-> VremenskiPodatki
VremenskiPodatki -right-> Oddajnik
@enduml

