@startuml
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center
skinparam usecase {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

actor Referent
actor "Sistem\nevidence\nbolnikov" as SistemEvidenceBolnikov
usecase (Prenos\npodatkov) as (PrenosPodatkov)

Referent -right-> (PrenosPodatkov)
(PrenosPodatkov) -right-> SistemEvidenceBolnikov
@enduml

