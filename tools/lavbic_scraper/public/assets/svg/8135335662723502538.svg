oročilo</text><polygon fill="#000000" points="275,425.3516,285,429.3516,275,433.3516,279,429.3516" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="163" x2="281" y1="429.3516" y2="429.3516"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="69" x="170" y="424.2856">// Potrditev</text><polygon fill="#000000" points="66,469.6172,56,473.6172,66,477.6172,62,473.6172" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="60" x2="152" y1="473.6172" y2="473.6172"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74" x="72" y="453.4185">// Odogovor</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="62" x="72" y="468.5513">// poročila</text><polygon fill="#000000" points="146,498.75,156,502.75,146,506.75,150,502.75" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="50" x2="152" y1="502.75" y2="502.75"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="69" x="57" y="497.6841">// Potrditev</text><!--MD5=[1167bd80c813e75b8bdad26375f2a6d6]
@startuml
hide footbox

skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam actorBorderColor black
skinparam actorBackgroundColor white
skinparam arrowColor black  
skinparam sequenceLifeLineBorderColor #5FB8EC
skinparam sequenceParticipantBorderColor #5FB8EC
skinparam sequenceParticipantBackgroundColor white

actor "Vremenski\ninformacijski\nsistem" as VremenskiIS
participant SatelitskaKomunikacija as ":SatKom"
participant VremenskaPostaja as ":VremenPost"
participant KomunikacijskaPovezava as ":KomPovez"
participant PodatkiOVremenu as ":PodatVreme"

VremenskiIS -> SatelitskaKomunikacija: // Zahtevaj\n// poročilo
activate VremenskiIS
activate SatelitskaKomunikacija
SatelitskaKomunikacija - -> VremenskiIS: // Potrditev
SatelitskaKomunikacija -> VremenskaPostaja: porocajVreme()
activate VremenskaPostaja
VremenskaPostaja - -> SatelitskaKomunikacija: // Potrditev
VremenskaPostaja -> KomunikacijskaPovezava: // Pridobi\n// povzetek
activate KomunikacijskaPovezava
KomunikacijskaPovezava -> PodatkiOVremenu: pripraviPovzetek()
activate PodatkiOVremenu
PodatkiOVremenu - -> KomunikacijskaPovezava
deactivate PodatkiOVremenu
KomunikacijskaPovezava - -> VremenskaPostaja
deactivate KomunikacijskaPovezava
VremenskaPostaja -> SatelitskaKomunikacija: // Posreduj\n// poročilo
SatelitskaKomunikacija - -> VremenskaPostaja: // Potrditev
deactivate VremenskaPostaja
SatelitskaKomunikacija -> VremenskiIS: // Odogovor\n// poročila
VremenskiIS - -> SatelitskaKomunikacija: // Potrditev
deactivate SatelitskaKomunikacija
deactivate VremenskiIS
@enduml

