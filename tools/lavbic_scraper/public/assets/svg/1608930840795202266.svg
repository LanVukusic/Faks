@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam ArrowColor black
skinparam rectangle {
  backgroundcolor white
  bordercolor #5FB8EC
}
skinparam package {
  backgroundcolor #e8f5fd
  bordercolor #5FB8EC
}

package " " as UpravljanjeNapak <<subsystem>>
package " " as UpravljanjeKonfiguracije <<subsystem>>
package " " as UpravljanjeEnergije <<subsystem>>
package " " as Komunikacije <<subsystem>>
package " " as ZbiranjePodatkov <<subsystem>>
package " " as Instrumenti <<subsystem>>

rectangle "                              Komunikacijska povezava                              " as KomunikacijskaPovezava

UpravljanjeNapak -down- KomunikacijskaPovezava
UpravljanjeKonfiguracije -down- KomunikacijskaPovezava
UpravljanjeEnergije -down- KomunikacijskaPovezava
Komunikacije -up- KomunikacijskaPovezava
ZbiranjePodatkov -up- KomunikacijskaPovezava
Instrumenti -up- KomunikacijskaPovezava
@enduml

