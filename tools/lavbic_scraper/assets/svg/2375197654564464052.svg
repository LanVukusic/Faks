@startuml
skinparam defaultTextAlignment center
skinparam backgroundcolor transparent
skinparam shadowing false
skinparam conditionStyle diamond

<style>
activityDiagram {
  backgroundColor white
  lineColor #5FB8EC
  arrow {
    lineColor black
  }
  diamond {
    lineColor black
  }
}
</style>

(*) -down-> "Potrdi odločitev o pridržanju" as PotrdiOdlocitevOPridrzanju
=== S1 === -down-> "Obvesti bolnika\no pravicah" as ObvestiBolnikaOPravicah
PotrdiOdlocitevOPridrzanju -down-> === S1 ===
=== S1 === -down-> "Zapiši odločitev\no pridržanju" as ZapisiOdlocitevOPridrzanju
ObvestiBolnikaOPravicah - -> === S2 ===
ZapisiOdlocitevOPridrzanju - -> === S2 ===
if "" then
  -right->[nevaren] "Poišči varno\nmesto" as PoisciVarnoMesto
  if "" then
    -left->[ni na voljo] "Premesti na\npolicijo"
    - -> === S3 ===
  else
    -down->[na voljo] "Premesti\nv varno\nbolnišnico"
    - - -> === S3 ===
  endif
else
  -left->[ni nevaren] "Sprejmi v\nbolnišnico" as SprejmiVBolnisnico
  - -> === S3 ===
endif
=== S3 === - -> "Obvesti\nsocialno\nvarstvo" as ObvestiSocialnoVarstvo
=== S3 === - -> "Obvesti\nsorodnike" as ObvestiSorodnike
=== S3 === - -> "Posodobi\nregister" as PosodobiRegister
ObvestiSocialnoVarstvo - -> === S4 ===
ObvestiSorodnike - -> === S4 ===
PosodobiRegister - -> === S4 ===
=== S4 === - -> (*)
@enduml

