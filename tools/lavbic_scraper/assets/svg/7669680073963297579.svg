link KonkrSubjekt to KonkrOpazovalec--><path codeLine="56" d="M302.55,178 C314.28,178 326,178 337.72,178 " fill="none" id="KonkrSubjekt-KonkrOpazovalec" style="stroke:#000000;stroke-width:1.0;"/><!--MD5=[f12672fccb4b4a0a8e834290e04b75d7]
@startuml
skinparam class {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam note {
  backgroundColor white
  bordercolor gray
  fontcolor gray
}

skinparam backgroundcolor transparent
hide circle

Class "<b>Subjekt</b>" as Subjekt #e8f5fd {
  - -
  Dodaj(o)
  Odstrani(o)
  Obvesti()
}

note left of Subjekt::Obvesti
  <b>for</b> vsi o <b>in</b> opazovalci
    o.Posodobi()
end note

Class "<b>Opazovalec</b>" as Opazovalec #e8f5fd {
  - -
  Posodobi()
}

Class KonkrSubjekt {
  stanjeSubjekta
  - -
  VrniStanje()
}

note left of KonkrSubjekt::VrniStanje
  <b>return</b> stanjeSubjekta
end note

Class KonkrOpazovalec {
  stanjeOpazovalca
  - -
  Posodobi()
}

note right of KonkrOpazovalec::Posodobi
  stanjeOpazovalca = 
    subjekt.VrniStanje()
end note

Subjekt o-right- Opazovalec
KonkrSubjekt -up-|> Subjekt
KonkrOpazovalec -up-|> Opazovalec
KonkrSubjekt -right- KonkrOpazovalec
@enduml

