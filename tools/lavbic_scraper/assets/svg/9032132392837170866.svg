@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam arrowColor black
skinparam state {
  BackgroundColor white
  BorderColor #5FB8EC
  StartColor #5FB8EC
  EndColor #5FB8EC
}

state Delovanje {
  state Preverjanje
  Preverjanje: do: preveri status

  state Kuhanje
  Kuhanje: do: zaženi generator

  state Alarm
  Alarm: do: prikaži dogodek

  state "Končano" as Koncano
  Koncano: do: vklopi alarm za 5 s
}

State "Onemogočeno" as Onemogoceno
State "Čakanje" as Cakanje

Preverjanje -> Kuhanje: OK
Kuhanje -down-> Koncano: potek\nčasovne\nomejitve
Kuhanje - -> Kuhanje: čas
Preverjanje -down-> Alarm: napaka\nvrtečega\npodstavka
Preverjanje -down-> Alarm: napaka\ngeneratorja
Alarm -down-> Onemogoceno
Delovanje -> Onemogoceno: vrata\nodprta
Koncano -down-> Cakanje
Delovanje -> Cakanje: preklic
@enduml

