@startuml
skinparam class {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam backgroundcolor transparent
hide circle

Class "Vremenska\npostaja" as VremenskaPostaja {
  -identifikator: int
  - -
  +porocajVreme(): void
  +porocajStanje(): void
  +varcevanje(instrumenti: Instrument[]): boolean
  +oddaljenNadzor(ukazi: string[]): boolean
  +ponovnaNastavitev(ukazi: string[]): boolean
  +ponovniZagon(instrumenti: Instrument[]): boolean[]
  +zaustavitev(instrumenti: Instrument[]): boolean[]
}

Class "Podatki\no vremenu" as PodatkiOVremenu {
  -temperaturaZraka: float
  -temperaturaZemlje: float
  -hitrostVetra: float
  -smeriVetra: string
  -zracniPritisk: float
  -kolicinaPadavin: float
  - -
  +zberi(): void
  +pripraviPovzetek(): void
}

Class "Zemeljski\ntermometer" as ZemeljskiTermometer {
  -zt_id: int
  -temperatura: float
  - -
  +vrni(): float
  +testiraj(): boolean
}

Class Vetrometer {
  -vet_id: int
  -hitrostVetra: float
  -smerVetra: string
  - -
  +vrni(): float
  +testiraj(): boolean
}

Class Barometer {
  -bar_id: int
  -zracniPritisk: float
  -visina: float
  - -
  +vrni(): float
  +testiraj(): boolean
}
@enduml

