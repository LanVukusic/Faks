@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam ArrowColor black
skinparam component {
  backgroundcolor #e8f5fd
  backgroundcolor<<subsystem>> white
  bordercolor #5FB8EC
}
skinparam interface {
  backgroundcolor #e8f5fd
  bordercolor #5FB8EC
}

left to right direction

interface "Iskanje\nizdelkov" as IskanjeIzdelkov <<interface>>
interface "Spletno\nnakupovanje" as SpletnoNakupovanje <<interface>>
interface "Uporabniška\nseja" as UporabniskaSeja <<interface>>
interface "Iskanje po\ninventarju" as IskanjePoInventarju <<interface>>
interface "Obvladovanje\nnaročil" as ObvladovanjeNarocil <<interface>>
interface "Obvladovanje\nstrank" as ObvladovanjeStrank <<interface>>
interface "Obvladovanje\ninventarja" as ObvladovanjeInventarja <<interface>>

component "Spletna trgovina" as SpletnaTrgovina <<subsystem>> {
  component Iskalnik <<component>>
  component "Nakupovalna\nkošarica" as NakupovalnaKosarica <<component>>
  component Avtentikacija <<component>>
}

component "Skladišče" as Skladisce <<subsystem>> {
  component Inventar <<component>>
}

component "Računovodstvo" as Racunovodstvo <<subsystem>> {
  component "Naročila" as Narocila <<component>>
  component Stranke <<component>>
}

IskanjeIzdelkov -down-> Iskalnik
SpletnoNakupovanje -down-> NakupovalnaKosarica
UporabniskaSeja -down-> Avtentikacija
Iskalnik -down-> IskanjePoInventarju
IskanjePoInventarju -down-> Inventar
NakupovalnaKosarica -down-> ObvladovanjeNarocil
ObvladovanjeNarocil -down-> Narocila
Avtentikacija -down-> ObvladovanjeStrank
ObvladovanjeStrank -down-> Stranke
Narocila -down-> ObvladovanjeInventarja
ObvladovanjeInventarja -up-> Inventar
@enduml

