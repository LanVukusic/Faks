@startuml
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center

hide stereotype

skinparam arrowColor black
skinparam rectangle {
  roundCorner<<aktivnost>> 25
  backgroundColor White
  borderColor #5FB8EC
}

rectangle "Senzor za\nkrvni sladkor" as SenzorZaKrvniSladkor
rectangle "Vrni vrednost\nsenzorja" <<aktivnost>> as VrniVrednostSenzorja
rectangle "Podatki\nsenzorja" as PodatkiSenzorja
rectangle "Izračunaj\nraven\nsladkorja" <<aktivnost>> as IzracunajRavenSladkorja
rectangle "Raven\nsladkorja" as RavenSladkorja
rectangle "Izračunaj\nodmerek\ninzulina" <<aktivnost>> as IzracunajOdmerekInzulina
rectangle "Potreba po\ninzulinu" as PotrebaPoInzulinu
rectangle "Določi ukaz\nčrpalki" <<aktivnost>> as DolociUkazCrpalki
rectangle "Podatki\nčrpalke" as PodatkiCrpalke
rectangle "Krmili\nčrpalko" <<aktivnost>> as KrmiliCrpalko
rectangle "Inzulinska\nčrpalka" as InzulinskaCrpalka

SenzorZaKrvniSladkor -right-> VrniVrednostSenzorja
VrniVrednostSenzorja -right-> PodatkiSenzorja
PodatkiSenzorja -right-> IzracunajRavenSladkorja
IzracunajRavenSladkorja -right-> RavenSladkorja
RavenSladkorja -down-> IzracunajOdmerekInzulina
IzracunajOdmerekInzulina -down-> PotrebaPoInzulinu
PotrebaPoInzulinu -left-> DolociUkazCrpalki
DolociUkazCrpalki -left-> PodatkiCrpalke
PodatkiCrpalke -left-> KrmiliCrpalko
KrmiliCrpalko -left-> InzulinskaCrpalka
@enduml

