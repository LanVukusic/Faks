@startuml
skinparam class {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
hide circle
hide members

Class "Nadzorni\nsistem" as NadzorniSistem
Class "Vremenska\npostaja" as VremenskaPostaja
Class "Vremenski\ninformacijski\nsistem" as VremenskiInformacijskiSistem
Class Satelit

NadzorniSistem "1 " - - "1..n" VremenskaPostaja
NadzorniSistem "1" - - "1  " VremenskiInformacijskiSistem
VremenskiInformacijskiSistem "1   " - - "   1..n" VremenskaPostaja
VremenskiInformacijskiSistem "1 " - - "1" Satelit
VremenskaPostaja "1..n" - - "1  " Satelit
@enduml

