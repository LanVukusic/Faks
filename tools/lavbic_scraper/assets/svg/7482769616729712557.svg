@startuml
skinparam class {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center
hide circle
hide members

Class "Sistem evidence\nbolnikov" as SistemEvidenceBolnikov << system >>
Class "Sistem za\nupravljalsko\nporočanje" as SistemZaUpravljalskoPorocanje << system >>
Class "Sprejemni\nsistem" as SprejemniSistem << system >>
Class "Mentcare" as Mentcare  << system >> #e8f5fd
Class "Sistem\nzdravstvene\nstatistike" as SistemZdravstveneStatistike << system >>
Class "Sistem za\npredpisovanje" as SistemZaPredpisovanje << system >>
Class "Sistem za\nnaročanje" as SistemZaNarocanje << system >>

SistemZaUpravljalskoPorocanje -up- Mentcare
SistemEvidenceBolnikov -down- Mentcare
SprejemniSistem -left- Mentcare
SistemZdravstveneStatistike -right- Mentcare
SistemZaNarocanje -up- Mentcare
SistemZaPredpisovanje -down- Mentcare
@enduml

