@startuml
skinparam class {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam backgroundcolor transparent
'skinparam shadowing false
skinparam defaultTextAlignment center
hide circle
hide members

Class Specialist
Class Stanje
Class Bolnik #e8f5fd
Class "Splošni\nzdravnik" as SplosniZdravnik
Class Posvet
Class Zdravilo
Class Zdravljenje
Class "Bolnišnični\nzdravnik" as BolnisnicniZdravnik

Bolnik "1..*" -up- "1" Specialist : " napoten\nk"
Bolnik "1..*" -right- "1" SplosniZdravnik : "napoten\nod"
Bolnik "1..*" -left- "1..*" Stanje : "z diagnozo"
Bolnik "        1..*" -down- "1..*" Posvet : "se\n udeleži"

Posvet "1..*" -right- "1..*" Zdravilo : "predpiše"
Posvet "1..*" -left- "1..*" Zdravljenje : "predpiše"
Posvet "1..*" -down- "1..4" BolnisnicniZdravnik : " sodeluje"
@enduml

