@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam ArrowColor black
skinparam package {
  backgroundcolor #e8f5fd
  backgroundcolor<<subsystem>> white
  bordercolor #5FB8EC
}

package SistemNarocanja <<subsystem>> {
  package GUI
  package ObdelavaNarocil
  package IzracunCene
  package ZunanjaShrambaPodatkov
  package SamostojniPodatki
  package TokPodatkov
}

package UpravljalecGUI
together {
  package ObvladovanjePodatkov
  package Repozitorij
  package DatotecniSistem
}

GUI .down.> ObdelavaNarocil
ObdelavaNarocil .down.> IzracunCene
ObdelavaNarocil .down.> ZunanjaShrambaPodatkov
SamostojniPodatki -up-|> ZunanjaShrambaPodatkov
TokPodatkov -up-|> ZunanjaShrambaPodatkov

Repozitorij -down-|> ObvladovanjePodatkov
DatotecniSistem -down-|> ObvladovanjePodatkov

GUI .right.> UpravljalecGUI
SamostojniPodatki .down.> Repozitorij
TokPodatkov .down.> DatotecniSistem
@enduml

