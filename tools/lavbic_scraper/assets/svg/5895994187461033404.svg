@startuml
skinparam backgroundcolor transparent
skinparam defaultTextAlignment center
skinparam usecase {
  backgroundColor white
  borderColor #5FB8EC
  arrowColor black
}
skinparam actorBorderColor black
skinparam actorBackgroundColor white

left to right direction

actor "Nadzorni\nsistem" as NadzorniSistem
actor "Vremenski\ninformacijski\nsistem" as VremenskiIS

usecase (Poročanje\no vremenu) as (PorocanjeOVremenu)
usecase (Poročanje\no stanju) as (PorocanjeOStanju)
usecase (Ponovni\nzagon) as (PonovniZagon)
usecase (Zaustavitev)
usecase (Ponovna\nnastavitev) as (PonovnaNastavitev)
usecase (Varčevanje\nz energijo) as (VarcevanjeZEnergijo)
usecase (Oddaljen\nnadzor) as (OddaljenNadzor)

VremenskiIS - -> (PorocanjeOVremenu)
VremenskiIS - -> (PorocanjeOStanju)

NadzorniSistem - -> (PonovniZagon)
NadzorniSistem - -> (Zaustavitev)
NadzorniSistem - -> (PonovnaNastavitev)
NadzorniSistem - -> (VarcevanjeZEnergijo)
NadzorniSistem - -> (OddaljenNadzor)
@enduml

